name: Build Zenon Editor EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # We install Pillow so PyInstaller can convert your PNG logo to a Windows ICO
        pip install pyinstaller PyQt5 Pillow 
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    - name: Build EXE with PyInstaller
      # Using your custom flags with Windows-compliant semicolons for paths
      run: |
        pyinstaller --onefile --noconsole `
        --icon=Logo.png `
        --collect-all PyQt5 `
        --add-data "UI;UI" `
        --add-data "icons;icons" `
        --add-data "plugins;plugins" `
        main.py

    - name: Upload Executable
      uses: actions/upload-artifact@v4
      with:
        name: Zenon-Editor-Windows
        path: dist/*.exe
