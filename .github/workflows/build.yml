name: Build Zenon Editor EXE

on:
  push:
    branches: [ main ]  # Runs every time you push code

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt5  # Add other libraries here if needed
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    - name: Build EXE
      run: pyinstaller --onefile --windowed --icon=Logo.png main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Zenon-Editor-Windows
        path: dist/*.exe
